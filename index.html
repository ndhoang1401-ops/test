<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FBF8F2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1F1C" media="(prefers-color-scheme: dark)">
<meta name="description" content="Lộ trình thi Chuyên Hóa - Nguyễn Doãn Hoàng">
<title>Chuyên Hóa — Nguyễn Doãn Hoàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS CUSTOM PROPERTIES - MOBILE FIRST
   ============================================================ */
:root{
  /* Light theme colors */
  --paper:#FBF8F2;
  --paper-soft:#F2ECDE;
  --card:#FFFFFF;
  --ink:#1E2622;
  --ink-soft:#5B665F;
  --ink-faint:#707B73;
  --line:#E4DBC8;
  --line-soft:#EEE7D8;

  /* Subject colors */
  --hoa:#178C6B;       --hoa-soft:#DBEEE5;
  --toan:#2E50D6;      --toan-soft:#DEE5FB;
  --anh:#C98A1E;       --anh-soft:#F6E8C8;
  --de:#6F4E92;        --de-soft:#E9E1F1;
  --van:#A85D3F;       --van-soft:#EFE0D6;
  --sport:#1E8C99;     --sport-soft:#DBEFF1;
  --school:#7C6F5E;    --school-soft:#EAE4D8;
  --rest:#5B6B82;      --rest-soft:#E2E7EE;
  --sleep:#3A3F66;     --sleep-soft:#E4E3EF;
  --meal:#B8862E;      --meal-soft:#F3E8CE;
  --prep:#6B7560;      --prep-soft:#E5E8DD;

  /* UI tokens */
  --strip: linear-gradient(90deg,#D9533C,#E8B23D,#178C6B,#2E50D6,#6F4E92);
  --radius: clamp(10px, 2vw, 14px);
  --radius-sm: clamp(8px, 1.5vw, 10px);
  --shadow: 0 1px 2px rgba(30,38,34,.04), 0 4px 16px -6px rgba(30,38,34,.10);

  /* Safe area defaults */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);

  /* MOBILE-FIRST Typography - optimized for portrait */
  --text-2xs: clamp(0.5625rem, 0.5rem + 0.3vw, 0.625rem);
  --text-xs: clamp(0.625rem, 0.55rem + 0.4vw, 0.75rem);
  --text-sm: clamp(0.6875rem, 0.6rem + 0.45vw, 0.875rem);
  --text-base: clamp(0.75rem, 0.65rem + 0.5vw, 0.9375rem);
  --text-md: clamp(0.8125rem, 0.7rem + 0.55vw, 1rem);
  --text-lg: clamp(0.875rem, 0.75rem + 0.6vw, 1.125rem);
  --text-xl: clamp(0.9375rem, 0.8rem + 0.7vw, 1.25rem);
  --text-2xl: clamp(1rem, 0.85rem + 0.8vw, 1.375rem);
  --text-3xl: clamp(1.125rem, 0.9rem + 1vw, 1.625rem);
  --text-4xl: clamp(1.25rem, 1rem + 1.2vw, 2rem);

  /* Spacing scale - mobile first */
  --space-1: clamp(4px, 0.5vw, 8px);
  --space-2: clamp(6px, 0.8vw, 12px);
  --space-3: clamp(8px, 1vw, 16px);
  --space-4: clamp(10px, 1.5vw, 20px);
  --space-5: clamp(12px, 2vw, 24px);
  --space-6: clamp(16px, 2.5vw, 32px);
  --space-8: clamp(20px, 3vw, 40px);
  --space-10: clamp(24px, 4vw, 48px);
}

/* Dark mode support */
@media (prefers-color-scheme: dark) {
  :root{
    --paper:#1A1F1C;
    --paper-soft:#222724;
    --card:#2A2F2C;
    --ink:#E8EBE7;
    --ink-soft:#A8ADAA;
    --ink-faint:#8A938D;
    --line:#3A3F3C;
    --line-soft:#333835;

    --hoa-soft:#1A3D33;
    --toan-soft:#1A2340;
    --anh-soft:#3D2E14;
    --de-soft:#2D213D;
    --van-soft:#3D2219;
    --sport-soft:#17373D;
    --school-soft:#2D2A23;
    --rest-soft:#1F2530;
    --sleep-soft:#1A1C28;
    --meal-soft:#3D3018;
    --prep-soft:#262A21;

    --shadow: 0 1px 2px rgba(0,0,0,.2), 0 4px 16px -6px rgba(0,0,0,.3);
  }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after{
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ============================================================
   RESET & BASE - Mobile First
   ============================================================ */
*,*::before,*::after{
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html{
  -webkit-text-size-adjust: 100%;
  -moz-text-size-adjust: 100%;
  text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body{
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.55;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
  min-block-size: 100vh;
  min-block-size: 100dvh;
}

img, svg{
  max-inline-size: 100%;
  block-size: auto;
  display: block;
}

:focus-visible{
  outline: 2px solid var(--hoa);
  outline-offset: 2px;
  border-radius: 2px;
}

::selection{
  background: var(--hoa-soft);
  color: var(--ink);
}

/* Utility */
.mono{font-family: 'IBM Plex Mono', monospace;}
.display{font-family: 'Fraunces', serif;}

.icon{
  inline-size: 1em;
  block-size: 1em;
  vertical-align: -0.125em;
  flex-shrink: 0;
}
.icon-lg{inline-size: 1.5em; block-size: 1.5em;}

.sr-only{
  position: absolute;
  inline-size: 1px;
  block-size: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* ============================================================
   APP LAYOUT
   ============================================================ */
.app{
  display: flex;
  flex-direction: column;
  min-block-size: 100vh;
  min-block-size: 100dvh;
}

/* ============================================================
   SIGNATURE STRIP
   ============================================================ */
.signature-strip{
  position: fixed;
  inset-block-start: 0;
  inset-inline-start: 0;
  inset-inline-end: 0;
  block-size: 3px;
  background: var(--strip);
  z-index: 200;
}

/* ============================================================
   SIDEBAR - Hidden on mobile, visible on desktop
   ============================================================ */
.sidebar{
  display: none;
}

/* ============================================================
   MOBILE TABS
   ============================================================ */
.mobile-sticky-header{
  position: sticky;
  inset-block-start: 3px;
  z-index: 150;
  background: color-mix(in srgb, var(--paper) 92%, transparent);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  padding-block-start: var(--safe-top);
}

.msh-row{
  display: flex;
  align-items: center;
  border-block-end: 1px dashed var(--line);
}

.phase-banner{
  display: none;
  flex: 1;
  min-inline-size: 0;
  border: none;
  background: transparent;
  font-family: 'Plus Jakarta Sans', sans-serif;
  text-align: start;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.phase-banner.show{
  display: flex;
  align-items: center;
  gap: clamp(4px, 0.8vw, 6px);
  font-size: var(--text-2xs);
  font-weight: 700;
  color: var(--ink);
  padding: clamp(5px, 0.8vw, 7px) clamp(10px, 1.5vw, 14px);
}
.phase-banner:hover{background: var(--line-soft);}
.phase-banner .pb-streak{
  margin-inline-start: auto;
  color: var(--ink-soft);
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}
.phase-banner .pb-swap{
  font-size: var(--text-2xs);
  opacity: 0.55;
  flex-shrink: 0;
}
.msh-row .theme-toggle-btn{
  margin-inline-end: clamp(8px, 1.5vw, 12px);
  inline-size: 30px; block-size: 30px;
}

.mobiletabs{
  display: flex;
  gap: clamp(4px, 0.8vw, 6px);
  overflow-x: auto;
  padding: clamp(6px, 1vw, 10px) clamp(8px, 1.5vw, 14px);
  border-block-end: 1px solid var(--line);
  scroll-snap-type: x proximity;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.mobiletabs::-webkit-scrollbar{display: none;}

.mobiletabs .navbtn{
  white-space: nowrap;
  inline-size: auto;
  flex-shrink: 0;
  scroll-snap-align: start;
  min-block-size: clamp(38px, 6vw, 44px);
  min-inline-size: clamp(38px, 6vw, 44px);
  font-size: var(--text-xs);
  padding: clamp(6px, 1vw, 10px) clamp(10px, 1.5vw, 14px);
  gap: clamp(4px, 0.8vw, 8px);
  display: inline-flex;
  align-items: center;
}

.mobiletabs .navbtn .ic{
  font-size: var(--text-sm);
  flex-shrink: 0;
}

/* ============================================================
   MAIN CONTENT - Mobile First
   ============================================================ */
.main{
  flex: 1;
  min-inline-size: 0;
  padding: clamp(10px, 2vw, 16px);
  padding-block-end: calc(clamp(40px, 8vw, 80px) + var(--safe-bottom));
  max-inline-size: 100%;
  overflow-x: hidden;
}

.panel{display: none;}
.panel.active{
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity: 0; transform: translateY(2px);}
  to{opacity: 1; transform: translateY(0);}
}

/* ============================================================
   NAV BUTTONS
   ============================================================ */
.navbtn{
  display: flex;
  align-items: center;
  text-align: start;
  border: none;
  background: transparent;
  border-radius: var(--radius-sm);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 0.15s ease, color 0.15s ease;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.navbtn:hover{background: var(--line-soft); color: var(--ink);}
.navbtn:active{opacity: 0.8;}

.navbtn.active{
  background: var(--card);
  color: var(--ink);
  box-shadow: var(--shadow);
}

/* Active indicator on left for sidebar */
.navbtn.active::before{
  content: "";
  position: absolute;
  inset-inline-start: 0;
  inset-block-start: 20%;
  inset-block-end: 20%;
  inline-size: 3px;
  border-radius: 3px;
  background: var(--strip);
}

/* ============================================================
   HERO SECTION - Optimized for portrait
   ============================================================ */
.hero{
  background: linear-gradient(160deg, var(--card), var(--paper-soft));
  border: 1px solid var(--line);
  border-radius: clamp(12px, 2vw, 20px);
  padding: clamp(14px, 2.5vw, 24px) clamp(12px, 2vw, 28px);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  margin-block-end: clamp(12px, 2vw, 20px);
  max-block-size: 85vh;
  max-block-size: 85dvh;
}

.hero::after{
  content: "";
  position: absolute;
  inset-inline-start: 0;
  inset-inline-end: 0;
  inset-block-end: 0;
  block-size: 3px;
  background: var(--strip);
}

.hero .eyebrow{
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--text-2xs);
  letter-spacing: 0.1em;
  color: var(--hoa);
  font-weight: 600;
  text-transform: uppercase;
  margin-block-end: clamp(2px, 0.5vw, 4px);
}

.hero h2{
  font-family: 'Fraunces', serif;
  font-size: var(--text-2xl);
  font-weight: 600;
  margin: 0 0 clamp(6px, 1vw, 10px);
  line-height: 1.2;
  max-inline-size: 100%;
}

.hero p.lede{
  color: var(--ink-soft);
  font-size: var(--text-xs);
  max-inline-size: 100%;
  margin: 0 0 clamp(10px, 1.5vw, 16px);
  line-height: 1.5;
}

/* Stats - 2 columns on mobile, 4 on desktop */
.statrow{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(4px, 0.8vw, 10px);
}

.stat{
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: clamp(8px, 1.5vw, 14px);
  padding: clamp(8px, 1.2vw, 12px) clamp(10px, 1.5vw, 16px);
  min-inline-size: 0;
}

.stat .num{
  font-family: 'Fraunces', serif;
  font-size: var(--text-xl);
  font-weight: 600;
  color: var(--ink);
  line-height: 1.1;
}

.stat .lab{
  font-size: var(--text-2xs);
  color: var(--ink-soft);
  margin-block-start: 2px;
  line-height: 1.3;
}

/* ============================================================
   SECTION TITLES
   ============================================================ */
h3.sectiontitle{
  font-family: 'Fraunces', serif;
  font-size: var(--text-lg);
  font-weight: 600;
  margin: clamp(16px, 3vw, 28px) 0 clamp(8px, 1.5vw, 12px);
  display: flex;
  align-items: center;
  gap: clamp(6px, 1vw, 10px);
  line-height: 1.2;
}

h3.sectiontitle .dot{
  inline-size: 7px;
  block-size: 7px;
  border-radius: 50%;
  background: var(--hoa);
  display: inline-block;
  flex-shrink: 0;
}

p.lead{
  color: var(--ink-soft);
  font-size: var(--text-xs);
  max-inline-size: 100%;
  line-height: 1.55;
  margin-block-end: clamp(8px, 1vw, 12px);
}

/* ============================================================
   CARDS - Full width on mobile
   ============================================================ */
.card{
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: clamp(12px, 1.8vw, 20px) clamp(12px, 2vw, 22px);
  margin-block-end: clamp(8px, 1.2vw, 14px);
  inline-size: 100%;
  overflow: hidden;
}

/* ============================================================
   PILLS - Easy to tap
   ============================================================ */
.pillrow{
  display: flex;
  gap: clamp(4px, 0.8vw, 8px);
  flex-wrap: nowrap;
  margin: clamp(8px, 1.2vw, 14px) 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  scroll-behavior: smooth;
  padding-block-end: 2px;
}

.pillrow::-webkit-scrollbar{display: none;}

.pill{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: var(--text-2xs);
  font-weight: 600;
  padding: clamp(6px, 1vw, 8px) clamp(10px, 1.5vw, 14px);
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--paper-soft);
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  min-block-size: clamp(36px, 6vw, 44px);
  min-inline-size: clamp(36px, 6vw, 44px);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.pill:active{opacity: 0.75;}
.pill:hover{border-color: var(--ink-faint);}
.pill.active{
  background: var(--ink);
  color: var(--card);
  border-color: var(--ink);
}

/* ============================================================
   SCHEDULE TABLE
   ============================================================ */
.daynote{
  font-size: var(--text-2xs);
  color: var(--ink-soft);
  background: var(--paper-soft);
  border: 1px dashed var(--line);
  border-radius: var(--radius-sm);
  padding: clamp(6px, 1vw, 10px) clamp(8px, 1.2vw, 14px);
  margin-block-end: clamp(8px, 1.2vw, 14px);
  line-height: 1.45;
}

.period-block{margin-block-end: 4px;}

.period-head{
  display: flex;
  align-items: center;
  gap: clamp(4px, 0.8vw, 8px);
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--text-2xs);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin: clamp(10px, 2vw, 18px) 0 clamp(4px, 0.8vw, 8px);
  font-weight: 600;
}

.period-head .bar{
  flex: 1;
  block-size: 1px;
  background: var(--line);
}

/* Table wrapper for scroll */
.schedule-table-wrapper{
  inline-size: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: var(--radius-sm);
}

table.sched{
  inline-size: 100%;
  border-collapse: collapse;
  font-size: var(--text-2xs);
  min-inline-size: 320px;
}

table.sched tr{border-block-end: 1px solid var(--line-soft);}
table.sched tr:last-child{border-block-end: none;}

table.sched td{
  padding: clamp(5px, 0.8vw, 8px) clamp(3px, 0.6vw, 6px);
  vertical-align: middle;
}

table.sched td.time{
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--text-2xs);
  color: var(--ink-soft);
  white-space: nowrap;
  inline-size: clamp(52px, 14vw, 70px);
}

table.sched td.tag{
  white-space: nowrap;
  inline-size: clamp(70px, 18vw, 110px);
}

table.sched td.note{
  color: var(--ink);
  line-height: 1.4;
}

table.sched td.chk{
  inline-size: clamp(26px, 6vw, 32px);
  text-align: center;
  padding-inline-end: 0;
}

.rowcheck{
  appearance: none;
  -webkit-appearance: none;
  inline-size: 18px;
  block-size: 18px;
  border: 1.5px solid var(--line);
  border-radius: 5px;
  background: var(--card);
  cursor: pointer;
  display: inline-block;
  position: relative;
  vertical-align: middle;
  flex-shrink: 0;
}
.rowcheck:checked{
  background: var(--hoa);
  border-color: var(--hoa);
}
.rowcheck:checked::after{
  content: "";
  position: absolute;
  inset-inline-start: 5px;
  inset-block-start: 1px;
  inline-size: 5px;
  block-size: 9px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

table.sched tr.now-row{
  background: var(--hoa-soft);
}
table.sched tr.now-row td.time{
  color: var(--hoa);
  font-weight: 700;
}
table.sched tr.now-row td.time::before{
  content: "▶ ";
}

table.sched tr.row-done td.note{
  text-decoration: line-through;
  text-decoration-color: var(--ink-faint);
  color: var(--ink-soft);
}
table.sched tr.row-done td.tag{opacity: 0.55;}

.progress-note{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: var(--text-2xs);
  font-weight: 700;
  color: var(--hoa);
  background: var(--hoa-soft);
  border-radius: var(--radius-sm);
  padding: clamp(6px, 1vw, 10px) clamp(8px, 1.2vw, 14px);
  margin-block-end: clamp(8px, 1.2vw, 14px);
  line-height: 1.45;
}
.progress-note .pn-count{font-family: 'IBM Plex Mono', monospace;}

.panel-title{font-size: var(--text-2xl); margin: 0 0 6px;}

.todaycard{
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: clamp(8px, 1.5vw, 14px);
}
.todaycard .tc-info{flex: 1; min-inline-size: 180px;}
.todaycard .tc-info b{display: block; font-size: var(--text-sm); margin-block-end: 2px; line-height: 1.3;}
.todaycard .tc-info span{font-size: var(--text-2xs); color: var(--ink-soft); line-height: 1.4;}
.todaycard .tc-cta{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: var(--text-xs);
  padding: clamp(8px, 1.2vw, 10px) clamp(14px, 2vw, 18px);
  border-radius: 999px;
  border: none;
  background: var(--ink);
  color: var(--card);
  cursor: pointer;
  white-space: nowrap;
  min-block-size: 40px;
  flex-shrink: 0;
}
.todaycard .tc-cta:hover{opacity: .88;}
.todaycard .tc-meta{
  flex-basis: 100%;
  font-size: var(--text-2xs);
  color: var(--ink-faint);
}

.tagpill{
  display: inline-flex;
  align-items: center;
  gap: clamp(2px, 0.4vw, 4px);
  padding: clamp(2px, 0.4vw, 4px) clamp(5px, 0.8vw, 10px);
  border-radius: 5px;
  font-size: var(--text-2xs);
  font-weight: 700;
  white-space: nowrap;
}

/* ============================================================
   LEGEND
   ============================================================ */
.legend{
  display: flex;
  flex-wrap: wrap;
  gap: clamp(4px, 0.8vw, 8px);
  margin: clamp(6px, 1vw, 12px) 0 clamp(2px, 0.5vw, 4px);
}

.legend .item{
  display: flex;
  align-items: center;
  gap: clamp(3px, 0.5vw, 5px);
  font-size: var(--text-2xs);
  color: var(--ink-soft);
}

.legend .sw{
  inline-size: 8px;
  block-size: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ============================================================
   ANALYSIS GRID - 1 column on mobile
   ============================================================ */
.analysis-grid{
  display: grid;
  grid-template-columns: 1fr;
  gap: clamp(8px, 1.2vw, 14px);
}

.analysis-grid .card h4{
  font-family: 'Fraunces', serif;
  font-size: var(--text-sm);
  margin: 0 0 6px;
  display: flex;
  gap: 6px;
  align-items: flex-start;
  line-height: 1.3;
}

.analysis-grid .card p,
.analysis-grid .card li{
  font-size: var(--text-xs);
  color: var(--ink-soft);
  line-height: 1.55;
}

.analysis-grid .card ul{
  margin: 0;
  padding-inline-start: 16px;
}

/* ============================================================
   TIMELINE MAP
   ============================================================ */
.timeline-map{
  display: flex;
  flex-direction: column;
  margin-block-start: 6px;
}

.tm-row{
  display: grid;
  grid-template-columns: clamp(48px, 15vw, 70px) 1fr;
  gap: clamp(6px, 1vw, 12px);
  padding: clamp(5px, 0.8vw, 8px) 0;
  border-block-end: 1px solid var(--line-soft);
  align-items: start;
}

.tm-row .tlab{
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--text-2xs);
  color: var(--ink-faint);
  padding-block-start: 2px;
}

.tm-row .tbody b{
  display: block;
  font-size: var(--text-xs);
  margin-block-end: 2px;
  line-height: 1.3;
}

.tm-row .tbody span{
  font-size: var(--text-2xs);
  color: var(--ink-soft);
  line-height: 1.4;
}

/* ============================================================
   CALLOUTS
   ============================================================ */
.callout{
  border-inline-start: 3px solid var(--hoa);
  background: var(--hoa-soft);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: clamp(8px, 1.2vw, 12px) clamp(10px, 1.5vw, 16px);
  font-size: var(--text-xs);
  color: var(--hoa);
  margin: clamp(8px, 1.2vw, 12px) 0;
  line-height: 1.5;
  inline-size: 100%;
}

.callout.warn{
  border-inline-start-color: var(--anh);
  background: var(--anh-soft);
  color: var(--anh);
}

.callout.cool{
  border-inline-start-color: var(--rest);
  background: var(--rest-soft);
  color: var(--rest);
}

/* ============================================================
   BACKGROUND MUSIC
   ============================================================ */
.music-frame{
  position: relative;
  inline-size: 100%;
  aspect-ratio: 16/9;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  background: #000;
}
.music-frame iframe{
  position: absolute;
  inset: 0;
  inline-size: 100%;
  block-size: 100%;
  border: 0;
}

.music-meta{
  display: flex;
  align-items: center;
  gap: clamp(8px, 1.2vw, 12px);
  margin-block-end: clamp(8px, 1.2vw, 12px);
}
.music-meta .mm-emoji{font-size: var(--text-2xl); flex-shrink: 0;}
.music-meta .mm-text b{display: block; font-size: var(--text-sm); line-height: 1.3;}
.music-meta .mm-text span{font-size: var(--text-2xs); color: var(--ink-soft);}

/* ============================================================
   STATISTICS — countdown, progress ring, heatmap
   ============================================================ */
.countdown-card{
  display: flex;
  align-items: center;
  gap: clamp(10px, 1.5vw, 16px);
}
.countdown-card .cd-icon{color: var(--de); flex-shrink: 0;}
.countdown-card .cd-body{display: flex; flex-direction: column; min-inline-size: 0;}
.countdown-card .cd-label{font-size: var(--text-2xs); color: var(--ink-soft); line-height: 1.3;}
.countdown-card .cd-days{
  font-family: 'Fraunces', serif;
  font-size: var(--text-3xl);
  font-weight: 600;
  line-height: 1.1;
  color: var(--ink);
}
.countdown-card .cd-unit{font-size: var(--text-2xs); color: var(--ink-soft);}
.cd-note{
  font-size: var(--text-2xs);
  color: var(--ink-faint);
  margin-block-start: clamp(8px, 1.2vw, 12px);
  line-height: 1.5;
}
.cd-note code{font-family: 'IBM Plex Mono', monospace; background: var(--paper-soft); padding: 1px 4px; border-radius: 4px;}

.stats-today-inner{
  display: flex;
  align-items: center;
  gap: clamp(12px, 2vw, 20px);
  flex-wrap: wrap;
}
.progress-ring{flex-shrink: 0;}
.progress-ring-text{
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 1.4rem;
  fill: var(--ink);
}
.stats-today-inner .st-info{display: flex; flex-direction: column; gap: 6px; min-inline-size: 0;}
.stats-today-inner .st-info b{font-size: var(--text-sm); line-height: 1.3;}
.stats-today-inner .st-streak{
  display: inline-flex; align-items: center; gap: 5px;
  font-size: var(--text-xs); color: var(--ink-soft); font-weight: 600;
}
.stats-today-inner .st-streak .icon{color: #E8762C;}

.heatmap-wrap{overflow-x: auto; -webkit-overflow-scrolling: touch; padding-block-end: 2px;}
.heatmap-grid{
  display: grid;
  grid-template-rows: repeat(7, 1fr);
  grid-auto-flow: column;
  gap: 3px;
  inline-size: max-content;
}
.hm-cell{
  inline-size: 11px; block-size: 11px;
  border-radius: 3px;
  background: var(--line-soft);
}
.hm-empty{background: transparent;}
.hm-l1{background: var(--hoa-soft);}
.hm-l2{background: color-mix(in srgb, var(--hoa) 45%, var(--hoa-soft));}
.hm-l3{background: color-mix(in srgb, var(--hoa) 75%, var(--hoa-soft));}
.hm-l4{background: var(--hoa);}
.hm-today{outline: 1.5px solid var(--ink); outline-offset: 1px;}

.theme-toggle-btn{
  display: inline-flex;

  inline-size: 36px; block-size: 36px;

/* ============================================================
   FOOTER
   ============================================================ */
footer.note{

/* ============================================================
   DATE / PHASE HELPERS
   ============================================================ */
const WEEKDAY_NAMES = ["Chủ Nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"];

// Heuristic: school year ~ Sept 5 → end of May; summer break ~ June 1 → Sept 4.
// Can be overridden manually via the phase banner / sidebar button if it ever drifts
// from the real calendar (e.g. school ends early, holidays shift).
function detectPhase(date){
  const m = date.getMonth(); // 0=Jan ... 11=Dec
  if(m===5 || m===6 || m===7) return "summer";
  if(m===8 && date.getDate() < 5) return "summer";
  return "school";
}

let phaseOverride = null; // "summer" | "school" | null = theo tự động — được nạp lại ở phần Init dưới cùng
function getPhase(){
  return phaseOverride || detectPhase(new Date());
}

function summerDayIdFor(date){
  const dow = date.getDay(); // 0=Sun..6=Sat
  if(dow===0) return "D";
  if(dow===2) return "B";
  if(dow===4) return "C";
  return "A"; // T2 · T4 · T6 · T7
}
function schoolDayIdFor(date){
  const dow = date.getDay();
  if(dow===0) return "S";
  if(dow===2) return "T3";
  if(dow===4) return "T5";
  return "N"; // T2 · T4 · T6 · T7
}

function daysUntilSep5(date){
  const y = date.getFullYear();
  let target = new Date(y, 8, 5);
  if(date >= target) target = new Date(y+1, 8, 5);
  return Math.ceil((target - date) / 86400000);
}

/* ============================================================
   LOCAL STORAGE — tick việc đã làm + streak
   Lưu trên máy/trình duyệt này. Có dự phòng bộ nhớ tạm nếu trình
   duyệt chặn localStorage (vd. xem trước trong khung chat) để
   trang không bị lỗi — khi đó dữ liệu chỉ tồn tại trong phiên xem.
   ============================================================ */
const memoryStore = {};
function storageGet(key){
  try{ return window.localStorage.getItem(key); }
  catch(e){ return (key in memoryStore) ? memoryStore[key] : null; }
}
function storageSet(key, val){
  try{ window.localStorage.setItem(key, val); }
  catch(e){ memoryStore[key] = val; }
}

function todayISO(d){
  d = d || new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function getChecklist(){
  try{ return JSON.parse(storageGet("choa_checklist") || "{}"); }
  catch(e){ return {}; }
}
function setChecklist(obj){ storageSet("choa_checklist", JSON.stringify(obj)); }

function isChecked(rowId){
  const day = getChecklist()[todayISO()] || {};
  return !!day[rowId];
}
function toggleChecked(rowId, checked){
  const list = getChecklist();
  const key = todayISO();
  if(!list[key]) list[key] = {};
  list[key][rowId] = checked;
  setChecklist(list);
  bumpActivity(key, list[key]);
}

function getActivity(){
  try{ return JSON.parse(storageGet("choa_activity") || "{}"); }
  catch(e){ return {}; }
}
function bumpActivity(dateKey, dayChecklist){
  const count = Object.values(dayChecklist).filter(Boolean).length;
  const act = getActivity();
  act[dateKey] = count;
  storageSet("choa_activity", JSON.stringify(act));
}
function getStreak(){
  const act = getActivity();
  let d = new Date();
  if(!(act[todayISO(d)] > 0)) d.setDate(d.getDate()-1);
  let streak = 0;
  while(act[todayISO(d)] > 0){
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

/* ============================================================
   RENDER HELPERS
   ============================================================ */
function isRowNow(timeStr, nowMinutes){
  const parts = timeStr.split("–");
  const toMin = (s)=>{ const hm = s.split(":").map(Number); return hm[0]*60+hm[1]; };
  const start = toMin(parts[0]);
  if(parts.length===1) return nowMinutes >= start && nowMinutes < start+15;
  const end = toMin(parts[1]);
  return nowMinutes >= start && nowMinutes < end;
}

function rowsToHTML(rows, opts){
  opts = opts || {};
  const datasetId = opts.datasetId || null;
  const nowMinutes = opts.highlightNow ? (()=>{ const n=new Date(); return n.getHours()*60+n.getMinutes(); })() : null;

  const groups = {sang:[], chieu:[], toi:[]};
  rows.forEach((r,i)=>groups[r.p].push({...r, _idx:i}));
  let html = "";
  ["sang","chieu","toi"].forEach(p=>{
    if(groups[p].length===0) return;
    html += `<div class="period-block"><div class="period-head">${PERIOD_LABEL[p]}<span class="bar" aria-hidden="true"></span></div>`;
    html += `<div class="schedule-table-wrapper"><table class="sched" aria-label="Lịch ${PERIOD_LABEL[p]}"><tbody>`;
    groups[p].forEach(r=>{
      const tg = TAGS[r.tag];
      const rowId = datasetId ? `${datasetId}_${r._idx}` : null;
      const checked = rowId ? isChecked(rowId) : false;
      const isNow = nowMinutes!==null && isRowNow(r.t, nowMinutes);
      const trClasses = [isNow?"now-row":"", checked?"row-done":""].filter(Boolean).join(" ");
      html += `<tr${trClasses?` class="${trClasses}"`:""}>
        ${rowId ? `<td class="chk"><input type="checkbox" class="rowcheck" aria-label="Đã hoàn thành: ${r.n}" ${checked?"checked":""} data-rowid="${rowId}"></td>` : ""}
        <td class="time mono">${r.t}</td>
        <td class="tag"><span class="tagpill" style="background:var(${tg.cs});color:var(${tg.c});">${ICONS[tg.icon]}${tg.name}</span></td>
        <td class="note">${r.n}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  return html;
}

function legendHTML(keys){
  return `<div class="legend">${keys.map(k=>{
    const tg=TAGS[k];
    return `<div class="item"><span class="sw" style="background:var(${tg.c});" aria-hidden="true"></span>${ICONS[tg.icon]}${tg.name}</div>`;
  }).join("")}</div>`;
}

function progressNoteHTML(datasetId, total){
  const day = getChecklist()[todayISO()] || {};
  const done = Object.keys(day).filter(k=>k.startsWith(datasetId+"_") && day[k]).length;
  return `<div class="progress-note">✅ Hoàn thành hôm nay <span class="pn-count" data-total="${total}">${done}/${total}</span></div>`;
}

function wireRowChecks(container, datasetId){
  container.querySelectorAll(".rowcheck").forEach(cb=>{
    cb.addEventListener("change", ()=>{
      toggleChecked(cb.dataset.rowid, cb.checked);
      const tr = cb.closest("tr");
      if(tr) tr.classList.toggle("row-done", cb.checked);
      const countEl = container.querySelector(".pn-count");
      if(countEl){
        const day = getChecklist()[todayISO()] || {};
        const done = Object.keys(day).filter(k=>k.startsWith(datasetId+"_") && day[k]).length;
        countEl.textContent = `${done}/${countEl.dataset.total}`;
      }
      refreshPhaseBanner();
    });
  });
}

// Lịch thi vào lớp 10 (gồm vòng chuyên Hóa) năm học 2027–2028 CHƯA được Sở
// GD&ĐT TP Huế công bố chính thức (thường công bố khoảng tháng 2–3 của năm
// thi). Ngày dưới đây là DỰ KIẾN, suy từ quy luật các năm gần nhất (kỳ thi
// thường rơi vào cuối tháng 5). Sửa lại hằng số này ngay khi có lịch chính thức.
const EXAM_TARGET_DATE = "2027-05-28";
const EXAM_TARGET_LABEL = "Thi vào lớp 10 (vòng chuyên Hóa) — Quốc Học Huế";
const EXAM_TARGET_IS_ESTIMATE = true;

function daysUntilExam(){
  const target = new Date(EXAM_TARGET_DATE + "T00:00:00");
  const now = new Date();
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((target - todayMidnight) / 86400000);
}
function countdownCardHTML(){
  const days = daysUntilExam();
  return `
    <div class="countdown-card">
      <span class="cd-icon icon-lg" aria-hidden="true">${ICONS.calendar}</span>
      <div class="cd-body">
        <span class="cd-label">${EXAM_TARGET_LABEL}</span>
        <b class="cd-days">${days > 0 ? days : 0}</b>
        <span class="cd-unit">${days > 0 ? "ngày nữa" : "đã qua mốc dự kiến"}</span>
      </div>
    </div>
    ${EXAM_TARGET_IS_ESTIMATE ? `<p class="cd-note">⚠️ Ngày <b>dự kiến</b>, suy theo quy luật các năm trước — Sở GD&ĐT TP Huế thường công bố lịch chính thức vào khoảng tháng 2–3. Sửa hằng số <code>EXAM_TARGET_DATE</code> trong code khi có thông báo thật.</p>` : ""}
  `;
}

function progressRingSVG(percent, size, strokeWidth){
  size = size || 120;
  strokeWidth = strokeWidth || 10;
  const radius = (size - strokeWidth) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference * (1 - Math.max(0, Math.min(100, percent)) / 100);
  const center = size / 2;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" class="progress-ring" role="img" aria-label="Tiến độ hôm nay: ${Math.round(percent)}%">
    <circle cx="${center}" cy="${center}" r="${radius}" fill="none" stroke="var(--line)" stroke-width="${strokeWidth}"/>
    <circle cx="${center}" cy="${center}" r="${radius}" fill="none" stroke="var(--hoa)" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" transform="rotate(-90 ${center} ${center})" style="transition: stroke-dashoffset .4s ease;"/>
    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" class="progress-ring-text">${Math.round(percent)}%</text>
  </svg>`;
}

function todayCompletionStats(){
  const phase = getPhase();
  const dayId = phase==="summer" ? summerDayIdFor(new Date()) : schoolDayIdFor(new Date());
  const dataset = (phase==="summer" ? SUMMER_DAYS : SCHOOL_DAYS).find(d=>d.id===dayId);
  if(!dataset) return {done:0, total:0, percent:0};
  const datasetId = (phase==="summer"?"sum":"sy")+dayId;
  const day = getChecklist()[todayISO()] || {};
  const done = Object.keys(day).filter(k=>k.startsWith(datasetId+"_") && day[k]).length;
  const total = dataset.data.length;
  return {done, total, percent: total ? (done/total*100) : 0};
}

function heatmapHTML(weeks){
  weeks = weeks || 12;
  const totalDays = weeks * 7;
  const activity = getActivity();
  const today = new Date();
  today.setHours(0,0,0,0);
  const dates = [];
  for(let i = totalDays - 1; i >= 0; i--){
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(d);
  }
  const leadPad = dates[0].getDay(); // số ô trống để cột đầu thẳng hàng theo thứ
  let cells = "";
  for(let i = 0; i < leadPad; i++){
    cells += `<span class="hm-cell hm-empty" aria-hidden="true"></span>`;
  }
  const todayKey = todayISO(today);
  dates.forEach(d=>{
    const key = todayISO(d);
    const count = activity[key] || 0;
    let level = 0;
    if(count >= 1) level = 1;
    if(count >= 4) level = 2;
    if(count >= 8) level = 3;
    if(count >= 14) level = 4;
    const isToday = key === todayKey;
    cells += `<span class="hm-cell hm-l${level}${isToday ? " hm-today" : ""}" title="${d.getDate()}/${d.getMonth()+1}: ${count} việc đã tick"></span>`;
  });
  return `<div class="heatmap-grid">${cells}</div>`;
}

function buildStats(){
  return `
  <h2 class="display panel-title">Thống Kê</h2>
  <p class="lead">Đếm ngược đến kỳ thi, tiến độ hôm nay, và nếp giữ thói quen theo thời gian.</p>

  <div class="card" id="countdownCard"></div>

  <h3 class="sectiontitle"><span class="dot" aria-hidden="true"></span>Hôm nay</h3>

    <div class="legend" style="margin-block-start:10px;">
      <div class="item"><span class="sw" style="background:var(--line-soft);" aria-hidden="true"></span>0 việc</div>
      <div class="item"><span class="sw" style="background:var(--hoa-soft);" aria-hidden="true"></span>1–3</div>
      <div class="item"><span class="sw" style="background:color-mix(in srgb, var(--hoa) 60%, var(--hoa-soft));" aria-hidden="true"></span>4–13</div>

  if(e.target.closest('button')) e.preventDefault();
}, {passive: false});

/* Phase banner: bấm để đổi tay Hè/Năm học nếu lệch thực tế */
const phaseBannerBtn = document.getElementById("phaseBanner");
if(phaseBannerBtn) phaseBannerBtn.addEventListener("click", swapPhaseOverride);

/* Init */
phaseOverride = storageGet("choa_phase_override") || null;
summerActive = summerDayIdFor(new Date());
schoolActive = schoolDayIdFor(new Date());
renderPhaseBanner();
renderSidebarFoot();
goTo("overview");

/* Cập nhật mỗi phút: streak, banner, và dòng "đang diễn ra" trong bảng */
setInterval(()=>{
  refreshPhaseBanner();
  const activePanel = document.querySelector(".panel.active");
  if(activePanel && activePanel.id==="panel-summer") renderSummerTable();
  if(activePanel && activePanel.id==="panel-school") renderSchoolTable();
}, 60000);
</script>
</body>
</html>
