<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FBF8F2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1F1C" media="(prefers-color-scheme: dark)">
<meta name="description" content="Lộ trình thi Chuyên Hóa - Nguyễn Doãn Hoàng">
<title>Chuyên Hóa — Nguyễn Doãn Hoàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS CUSTOM PROPERTIES
   ============================================================ */
:root{
  /* Light theme colors */
  --paper:#FBF8F2;
  --paper-soft:#F2ECDE;
  --card:#FFFFFF;
  --ink:#1E2622;
  --ink-soft:#5B665F;
  --ink-faint:#8B948C;
  --line:#E4DBC8;
  --line-soft:#EEE7D8;

  /* Subject colors */
  --hoa:#178C6B;       --hoa-soft:#DBEEE5;
  --toan:#2E50D6;      --toan-soft:#DEE5FB;
  --anh:#C98A1E;       --anh-soft:#F6E8C8;
  --de:#6F4E92;        --de-soft:#E9E1F1;
  --van:#A85D3F;       --van-soft:#EFE0D6;
  --sport:#1E8C99;     --sport-soft:#DBEFF1;
  --school:#7C6F5E;    --school-soft:#EAE4D8;
  --rest:#5B6B82;      --rest-soft:#E2E7EE;
  --sleep:#3A3F66;     --sleep-soft:#E4E3EF;
  --meal:#B8862E;      --meal-soft:#F3E8CE;
  --prep:#6B7560;      --prep-soft:#E5E8DD;

  /* UI tokens */
  --strip: linear-gradient(90deg,#D9533C,#E8B23D,#178C6B,#2E50D6,#6F4E92);
  --radius: clamp(10px, 2vw, 14px);
  --radius-sm: clamp(8px, 1.5vw, 10px);
  --shadow: 0 1px 2px rgba(30,38,34,.04), 0 6px 20px -8px rgba(30,38,34,.10);
  
  /* Safe area defaults */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);

  /* Typography scale using clamp() */
  --text-xs: clamp(0.625rem, 0.6rem + 0.15vw, 0.75rem);
  --text-sm: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-base: clamp(0.8125rem, 0.78rem + 0.3vw, 0.9375rem);
  --text-md: clamp(0.875rem, 0.83rem + 0.35vw, 1rem);
  --text-lg: clamp(1rem, 0.9rem + 0.5vw, 1.125rem);
  --text-xl: clamp(1.125rem, 1rem + 0.6vw, 1.375rem);
  --text-2xl: clamp(1.25rem, 1.1rem + 0.8vw, 1.625rem);
  --text-3xl: clamp(1.375rem, 1.15rem + 1vw, 2rem);
  --text-4xl: clamp(1.5rem, 1.25rem + 1.5vw, 2.5rem);
}

/* Dark mode support */
@media (prefers-color-scheme: dark) {
  :root{
    --paper:#1A1F1C;
    --paper-soft:#222724;
    --card:#2A2F2C;
    --ink:#E8EBE7;
    --ink-soft:#A8ADAA;
    --ink-faint:#6B706D;
    --line:#3A3F3C;
    --line-soft:#333835;

    --hoa-soft:#1A3D33;
    --toan-soft:#1A2340;
    --anh-soft:#3D2E14;
    --de-soft:#2D213D;
    --van-soft:#3D2219;
    --sport-soft:#17373D;
    --school-soft:#2D2A23;
    --rest-soft:#1F2530;
    --sleep-soft:#1A1C28;
    --meal-soft:#3D3018;
    --prep-soft:#262A21;
  }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after{
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*,
*::before,
*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html{
  -webkit-text-size-adjust: 100%;
  -moz-text-size-adjust: 100%;
  text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body{
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.5;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
  min-block-size: 100vh;
  min-block-size: 100dvh;
}

img{
  max-inline-size: 100%;
  block-size: auto;
  display: block;
}

/* Focus styles for accessibility */
:focus-visible{
  outline: 2px solid var(--hoa);
  outline-offset: 2px;
  border-radius: 4px;
}

/* Selection */
::selection{
  background: var(--hoa-soft);
  color: var(--ink);
}

/* ============================================================
   UTILITY CLASSES
   ============================================================ */
.mono{
  font-family: 'IBM Plex Mono', monospace;
}

.display{
  font-family: 'Fraunces', serif;
}

/* ============================================================
   APP LAYOUT
   ============================================================ */
.app{
  display: flex;
  min-block-size: 100vh;
  min-block-size: 100dvh;
}

/* ============================================================
   SIGNATURE STRIP
   ============================================================ */
.signature-strip{
  position: fixed;
  inset-block-start: 0;
  inset-inline-start: 0;
  inset-inline-end: 0;
  block-size: 4px;
  background: var(--strip);
  z-index: 100;
}

/* ============================================================
   SIDEBAR (DESKTOP)
   ============================================================ */
.sidebar{
  inline-size: clamp(200px, 20vw, 260px);
  min-inline-size: 200px;
  padding: clamp(20px, 3vw, 28px) clamp(14px, 2vw, 18px) 18px;
  border-inline-end: 1px solid var(--line);
  background: var(--paper-soft);
  position: sticky;
  inset-block-start: 0;
  block-size: 100vh;
  block-size: 100dvh;
  overflow-y: auto;
  flex-shrink: 0;
}

.brand{
  padding: 0 6px 22px;
}

.brand .eyebrow{
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--text-xs);
  letter-spacing: 0.12em;
  color: var(--hoa);
  text-transform: uppercase;
  font-weight: 600;
}

.brand h1{
  font-family: 'Fraunces', serif;
  font-size: var(--text-2xl);
  font-weight: 600;
  margin: 6px 0 4px;
  line-height: 1.15;
  color: var(--ink);
}

.brand p{
  font-size: var(--text-xs);
  color: var(--ink-soft);
}

/* Navigation */
.navgroup{
  margin-block-start: 10px;
}

.navbtn{
  display: flex;
  align-items: center;
  gap: 10px;
  inline-size: 100%;
  text-align: start;
  padding: clamp(10px, 1.5vw, 12px);
  margin-block-end: 4px;
  border: none;
  background: transparent;
  border-radius: var(--radius-sm);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 0.15s ease, color 0.15s ease;
  position: relative;
  min-block-size: 44px;
  min-inline-size: 44px;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.navbtn .ic{
  font-size: var(--text-md);
  flex-shrink: 0;
}

.navbtn:hover{
  background: var(--line-soft);
  color: var(--ink);
}

.navbtn:active{
  transform: scale(0.97);
}

.navbtn.active{
  background: var(--card);
  color: var(--ink);
  box-shadow: var(--shadow);
}

.navbtn.active::before{
  content: "";
  position: absolute;
  inset-inline-start: 0;
  inset-block-start: 8px;
  inset-block-end: 8px;
  inline-size: 3px;
  border-radius: 3px;
  background: var(--strip);
}

.sidebar-foot{
  margin-block-start: 22px;
  padding: clamp(10px, 1.5vw, 14px);
  border-radius: var(--radius-sm);
  background: var(--card);
  border: 1px solid var(--line);
  font-size: var(--text-xs);
  color: var(--ink-soft);
}

.sidebar-foot b{
  color: var(--ink);
}

/* ============================================================
   MOBILE TABS
   ============================================================ */
.mobiletabs{
  display: none;
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.main{
  flex: 1;
  min-inline-size: 0;
  padding: clamp(20px, 3vw, 32px) clamp(16px, 4vw, 40px) clamp(60px, 8vw, 80px);
  max-inline-size: 980px;
  -webkit-overflow-scrolling: touch;
  content-visibility: auto;
  contain-intrinsic-size: auto 500px;
}

.panel{
  display: none;
}

.panel.active{
  display: block;
  animation: fadeIn 0.35s ease;
}

@keyframes fadeIn{
  from{
    opacity: 0;
    transform: translateY(4px);
  }
  to{
    opacity: 1;
    transform: translateY(0);
  }
}

/* ============================================================
   HERO SECTION
   ============================================================ */
.hero{
  background: linear-gradient(135deg, var(--card), var(--paper-soft));
  border: 1px solid var(--line);
  border-radius: clamp(14px, 2.5vw, 20px);
  padding: clamp(18px, 3vw, 32px) clamp(14px, 3vw, 34px);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  margin-block-end: clamp(16px, 2.5vw, 26px);
}

.hero::after{
  content: "";
  position: absolute;
  inset-inline-start: 0;
  inset-inline-end: 0;
  inset-block-end: 0;
  block-size: 5px;
  background: var(--strip);
}

.hero .eyebrow{
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--text-xs);
  letter-spacing: 0.12em;
  color: var(--hoa);
  font-weight: 600;
  text-transform: uppercase;
}

.hero h2{
  font-family: 'Fraunces', serif;
  font-size: var(--text-3xl);
  font-weight: 600;
  margin: 8px 0 10px;
  max-inline-size: 620px;
  line-height: 1.25;
}

.hero p.lede{
  color: var(--ink-soft);
  font-size: var(--text-sm);
  max-inline-size: 600px;
  margin: 0 0 18px;
}

/* Stats grid */
.statrow{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(140px, 100%), 1fr));
  gap: clamp(8px, 1.5vw, 14px);
}

.stat{
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: clamp(10px, 1.5vw, 12px) clamp(12px, 2vw, 16px);
  min-inline-size: 0;
}

.stat .num{
  font-family: 'Fraunces', serif;
  font-size: var(--text-2xl);
  font-weight: 600;
  color: var(--ink);
}

.stat .lab{
  font-size: var(--text-xs);
  color: var(--ink-soft);
  margin-block-start: 2px;
}

/* ============================================================
   SECTION TITLES
   ============================================================ */
h3.sectiontitle{
  font-family: 'Fraunces', serif;
  font-size: var(--text-xl);
  font-weight: 600;
  margin: clamp(24px, 4vw, 34px) 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

h3.sectiontitle .dot{
  inline-size: 8px;
  block-size: 8px;
  border-radius: 50%;
  background: var(--hoa);
  display: inline-block;
  flex-shrink: 0;
}

p.lead{
  color: var(--ink-soft);
  font-size: var(--text-sm);
  max-inline-size: 680px;
  line-height: 1.6;
}

/* ============================================================
   CARDS
   ============================================================ */
.card{
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: clamp(14px, 2vw, 20px) clamp(14px, 2.5vw, 22px);
  margin-block-end: clamp(12px, 1.5vw, 16px);
}

/* ============================================================
   PILLS
   ============================================================ */
.pillrow{
  display: flex;
  gap: clamp(6px, 1vw, 8px);
  flex-wrap: wrap;
  margin: clamp(10px, 1.5vw, 14px) 0 clamp(14px, 2vw, 18px);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  scroll-behavior: smooth;
  padding-block-end: 4px;
}

.pillrow::-webkit-scrollbar{
  display: none;
}

.pill{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: var(--text-xs);
  font-weight: 600;
  padding: clamp(7px, 1vw, 8px) clamp(12px, 1.5vw, 14px);
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--paper-soft);
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
  white-space: nowrap;
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  min-block-size: 44px;
  min-inline-size: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.pill:active{
  transform: scale(0.96);
}

.pill:hover{
  border-color: var(--ink-faint);
}

.pill.active{
  background: var(--ink);
  color: var(--card);
  border-color: var(--ink);
}

/* ============================================================
   SCHEDULE TABLE
   ============================================================ */
.daynote{
  font-size: var(--text-xs);
  color: var(--ink-soft);
  background: var(--paper-soft);
  border: 1px dashed var(--line);
  border-radius: var(--radius-sm);
  padding: clamp(8px, 1vw, 10px) clamp(10px, 1.5vw, 14px);
  margin-block-end: clamp(12px, 1.5vw, 16px);
  line-height: 1.5;
}

.period-block{
  margin-block-end: 6px;
}

.period-head{
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--text-xs);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin: clamp(16px, 2.5vw, 22px) 0 clamp(8px, 1vw, 10px);
  font-weight: 600;
}

.period-head .bar{
  flex: 1;
  block-size: 1px;
  background: var(--line);
}

/* Table container for overflow protection */
.schedule-table-wrapper{
  inline-size: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table.sched{
  inline-size: 100%;
  border-collapse: collapse;
  font-size: var(--text-sm);
  min-inline-size: 400px;
}

table.sched tr{
  border-block-end: 1px solid var(--line-soft);
}

table.sched tr:last-child{
  border-block-end: none;
}

table.sched td{
  padding: clamp(8px, 1vw, 10px) clamp(4px, 1vw, 8px);
  vertical-align: middle;
}

table.sched td.time{
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--text-xs);
  color: var(--ink-soft);
  white-space: nowrap;
  inline-size: clamp(60px, 12vw, 78px);
}

table.sched td.tag{
  white-space: nowrap;
  inline-size: clamp(90px, 18vw, 150px);
}

table.sched td.note{
  color: var(--ink);
  line-height: 1.4;
}

.tagpill{
  display: inline-flex;
  align-items: center;
  gap: clamp(3px, 0.5vw, 6px);
  padding: clamp(3px, 0.5vw, 4px) clamp(7px, 1vw, 10px);
  border-radius: 6px;
  font-size: var(--text-xs);
  font-weight: 700;
  white-space: nowrap;
}

/* ============================================================
   LEGEND
   ============================================================ */
.legend{
  display: flex;
  flex-wrap: wrap;
  gap: clamp(6px, 1vw, 10px);
  margin: clamp(10px, 1.5vw, 14px) 0 clamp(4px, 0.5vw, 6px);
}

.legend .item{
  display: flex;
  align-items: center;
  gap: clamp(4px, 0.5vw, 6px);
  font-size: var(--text-xs);
  color: var(--ink-soft);
}

.legend .sw{
  inline-size: clamp(8px, 1vw, 10px);
  block-size: clamp(8px, 1vw, 10px);
  border-radius: 3px;
  flex-shrink: 0;
}

/* ============================================================
   ANALYSIS GRID
   ============================================================ */
.analysis-grid{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
  gap: clamp(12px, 1.5vw, 16px);
}

.analysis-grid .card h4{
  font-family: 'Fraunces', serif;
  font-size: var(--text-md);
  margin: 0 0 8px;
  display: flex;
  gap: 8px;
  align-items: center;
}

.analysis-grid .card p,
.analysis-grid .card li{
  font-size: var(--text-sm);
  color: var(--ink-soft);
  line-height: 1.65;
}

.analysis-grid .card ul{
  margin: 0;
  padding-inline-start: 18px;
}

/* ============================================================
   TIMELINE MAP
   ============================================================ */
.timeline-map{
  display: flex;
  flex-direction: column;
  margin-block-start: 10px;
}

.tm-row{
  display: grid;
  grid-template-columns: clamp(60px, 12vw, 90px) 1fr;
  gap: clamp(8px, 1.5vw, 14px);
  padding: clamp(8px, 1vw, 10px) 0;
  border-block-end: 1px solid var(--line-soft);
  align-items: start;
}

.tm-row .tlab{
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--text-xs);
  color: var(--ink-faint);
  padding-block-start: 3px;
}

.tm-row .tbody b{
  display: block;
  font-size: var(--text-sm);
  margin-block-end: 2px;
}

.tm-row .tbody span{
  font-size: var(--text-xs);
  color: var(--ink-soft);
}

/* ============================================================
   CALLOUTS
   ============================================================ */
.callout{
  border-inline-start: 3px solid var(--hoa);
  background: var(--hoa-soft);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: clamp(10px, 1.5vw, 12px) clamp(12px, 2vw, 16px);
  font-size: var(--text-sm);
  color: var(--hoa);
  margin: clamp(10px, 1.5vw, 14px) 0;
  line-height: 1.5;
}

.callout.warn{
  border-inline-start-color: var(--anh);
  background: var(--anh-soft);
  color: var(--anh);
}

.callout.cool{
  border-inline-start-color: var(--rest);
  background: var(--rest-soft);
  color: var(--rest);
}

/* ============================================================
   STYLE GALLERY
   ============================================================ */
.gallerywrap{
  border: 1px solid var(--line);
  border-radius: clamp(14px, 2vw, 18px);
  padding: clamp(16px, 2.5vw, 24px);
  background: var(--paper-soft);
}

.theme-frame{
  border-radius: var(--radius);
  padding: clamp(16px, 2.5vw, 24px);
  transition: background 0.25s, color 0.25s;
}

/* Theme: Apple */
.theme-apple{
  background: #F5F5F7;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Helvetica, Arial, sans-serif;
  color: #1D1D1F;
}

.theme-apple .ag-title{
  font-size: clamp(18px, 3vw, 22px);
  font-weight: 700;
  margin-block-end: 4px;
  letter-spacing: -0.01em;
}

.theme-apple .ag-sub{
  font-size: var(--text-sm);
  color: #6E6E73;
  margin-block-end: 16px;
}

.theme-apple .ag-row{
  display: flex;
  align-items: center;
  gap: clamp(10px, 1.5vw, 14px);
  background: #fff;
  border-radius: 16px;
  padding: clamp(12px, 1.5vw, 14px) clamp(14px, 2vw, 18px);
  margin-block-end: 10px;
  box-shadow: 0 1px 1px rgba(0,0,0,.03), 0 8px 24px -16px rgba(0,0,0,.18);
}

.theme-apple .ag-time{
  font-size: var(--text-sm);
  color: #86868B;
  inline-size: clamp(70px, 12vw, 92px);
  font-weight: 600;
}

.theme-apple .ag-icon{
  inline-size: clamp(28px, 5vw, 34px);
  block-size: clamp(28px, 5vw, 34px);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-md);
  background: #E8F3FF;
  flex-shrink: 0;
}

.theme-apple .ag-text b{
  display: block;
  font-size: var(--text-sm);
  font-weight: 600;
}

.theme-apple .ag-text span{
  font-size: var(--text-xs);
  color: #6E6E73;
}

/* Theme: Notion */
.theme-notion{
  background: #FFFFFF;
  font-family: Helvetica, Arial, sans-serif;
  color: #37352F;
  border: 1px solid #EBEAE7;
}

.theme-notion .ag-title{
  font-size: clamp(20px, 3.5vw, 24px);
  font-weight: 700;
  margin-block-end: 2px;
}

.theme-notion .ag-sub{
  font-size: var(--text-sm);
  color: #9B9A97;
  margin-block-end: 14px;
}

.theme-notion .ag-row{
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 6px;

/* ============================================================
   RENDER HELPERS
   ============================================================ */
function rowsToHTML(rows){
  const groups = {sang:[], chieu:[], toi:[]};
  rows.forEach(r=>groups[r.p].push(r));
  let html = "";
  ["sang","chieu","toi"].forEach(p=>{
    if(groups[p].length===0) return;
    html += `<div class="period-block"><div class="period-head">${PERIOD_LABEL[p]}<span class="bar" aria-hidden="true"></span></div>`;
    html += `<div class="schedule-table-wrapper"><table class="sched" aria-label="Lịch ${PERIOD_LABEL[p]}"><tbody>`;
    groups[p].forEach(r=>{
      const tg = TAGS[r.tag];
      html += `<tr>
        <td class="time mono">${r.t}</td>
        <td class="tag"><span class="tagpill" style="background:var(${tg.cs});color:var(${tg.c});">${tg.emoji} ${tg.name}</span></td>
        <td class="note">${r.n}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  return html;
}
function legendHTML(keys){
  return `<div class="legend">${keys.map(k=>{
    const tg=TAGS[k];
    return `<div class="item"><span class="sw" style="background:var(${tg.c});" aria-hidden="true"></span>${tg.emoji} ${tg.name}</div>`;
  }).join("")}</div>`;
}

const main = document.getElementById("main");
const navgroup = document.getElementById("navgroup");
const mobileNav = document.getElementById("mobileNav");

function navButtonHTML(item, idPrefix){
  return `<button class="navbtn" data-target="${item.id}" id="${idPrefix}-${item.id}" role="tab" aria-selected="false" aria-controls="panel-${item.id}"><span class="ic" aria-hidden="true">${item.icon}</span>${item.label}</button>`;
}
NAV.forEach(item=>{
  navgroup.insertAdjacentHTML("beforeend", navButtonHTML(item,"nav"));
  mobileNav.insertAdjacentHTML("beforeend", navButtonHTML(item,"mnav"));
});

function renderPanel(id){
  main.innerHTML = `<div class="panel active" id="panel-${id}" role="tabpanel" aria-label="${NAV.find(n=>n.id===id)?.label || ''}"></div>`;
  const p = document.getElementById(`panel-${id}`);
  if(id==="overview") p.innerHTML = buildOverview();
  if(id==="summer"){ p.innerHTML = buildSummer(); wireSummer(); }
  if(id==="school"){ p.innerHTML = buildSchool(); wireSchool(); }
  if(id==="special"){ p.innerHTML = buildSpecial(); wireSpecial(); }
  if(id==="gallery"){ p.innerHTML = buildGallery(); wireGallery(); }
  
  // Scroll to top on mobile after navigation
  if (window.innerWidth <= 768) {
    window.scrollTo({top: 0, behavior: 'instant'});
    main.scrollTop = 0;
  }
}

function setActiveNav(id){
  document.querySelectorAll(".navbtn").forEach(b=>{
    const isActive = b.dataset.target === id;
    b.classList.toggle("active", isActive);
    b.setAttribute("aria-selected", isActive.toString());
  });
  
  // On mobile, scroll the active tab into view
  if (window.innerWidth <= 768) {
    const mobileActiveBtn = document.getElementById(`mnav-${id}`);
    if (mobileActiveBtn) {
      mobileActiveBtn.scrollIntoView({behavior: 'instant', block: 'nearest', inline: 'center'});
    }
  }
}

function goTo(id){
  setActiveNav(id);
  renderPanel(id);
}

document.querySelectorAll(".navbtn").forEach(b=>{
  b.addEventListener("click", ()=>goTo(b.dataset.target));
});

let summerActive = "A";
function wireSummer(){
  const pillrow = document.getElementById("summerPills");
  pillrow.innerHTML = SUMMER_DAYS.map(d=>`<button class="pill ${d.id===summerActive?'active':''}" data-day="${d.id}" role="tab" aria-selected="${d.id===summerActive}" aria-controls="summerTable">${d.label}</button>`).join("");
  pillrow.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      summerActive = btn.dataset.day;
      pillrow.querySelectorAll(".pill").forEach(b=>{
        b.classList.toggle("active", b.dataset.day===summerActive);
        b.setAttribute("aria-selected", (b.dataset.day===summerActive).toString());
      });
      renderSummerTable();
    });
  });
  renderSummerTable();
}
function renderSummerTable(){
  const d = SUMMER_DAYS.find(x=>x.id===summerActive);
  document.getElementById("summerTable").innerHTML = `<div class="daynote">📌 ${d.note}</div>` + rowsToHTML(d.data);
}

const SCHOOL_DAYS = [
  {id:"N", label:"T2·4·6·7", data:syNormal, note:"Học chính khóa 7h00–11h30, không có học thêm tối. Tự học dồn vào chiều/tối."},
  {id:"T", label:"T3 & T5", data:syTutor, note:"Học chính khóa sáng + học thêm tối. Thứ 5 buổi học thêm dài hơn (đến 21h00) — xem ghi chú trong từng dòng."},
  {id:"S", label:"CN", data:sySun, note:"KHÔNG có học chính khóa — ngày tự học quan trọng nhất trong tuần năm học, có học thêm Hóa buổi chiều."},
];
let schoolActive = "N";
function wireSchool(){
  const pillrow = document.getElementById("schoolPills");
  pillrow.innerHTML = SCHOOL_DAYS.map(d=>`<button class="pill ${d.id===schoolActive?'active':''}" data-day="${d.id}" role="tab" aria-selected="${d.id===schoolActive}" aria-controls="schoolTable">${d.label}</button>`).join("");
  pillrow.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      schoolActive = btn.dataset.day;
      pillrow.querySelectorAll(".pill").forEach(b=>{
        b.classList.toggle("active", b.dataset.day===schoolActive);
        b.setAttribute("aria-selected", (b.dataset.day===schoolActive).toString());
      });
      renderSchoolTable();
    });
  });
  renderSchoolTable();
}
function renderSchoolTable(){
  const d = SCHOOL_DAYS.find(x=>x.id===schoolActive);
  document.getElementById("schoolTable").innerHTML = `<div class="daynote">📌 ${d.note}</div>` + rowsToHTML(d.data);
}

/* ---- Special sub-tabs ---- */
const SPECIAL_MODES = [
  {id:"cram", label:"🚀 Nước rút", fn:specialCram},
  {id:"low", label:"🔋 Mất động lực", fn:specialLow},
  {id:"multi", label:"⚠️ Nhiều bài KT", fn:specialMulti},
];
let specialActive = "cram";
function wireSpecial(){
  const pillrow = document.getElementById("specialPills");
  pillrow.innerHTML = SPECIAL_MODES.map(m=>`<button class="pill ${m.id===specialActive?'active':''}" data-m="${m.id}" role="tab" aria-selected="${m.id===specialActive}" aria-controls="specialBody">${m.label}</button>`).join("");
  pillrow.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      specialActive = btn.dataset.m;
      pillrow.querySelectorAll(".pill").forEach(b=>{
        b.classList.toggle("active", b.dataset.m===specialActive);
        b.setAttribute("aria-selected", (b.dataset.m===specialActive).toString());
      });
      renderSpecialBody();
    });
  });
  renderSpecialBody();
}
function renderSpecialBody(){
  const m = SPECIAL_MODES.find(x=>x.id===specialActive);
  document.getElementById("specialBody").innerHTML = m.fn();
}

/* ---- Gallery theme switch ---- */
let themeActive = "apple";
function wireGallery(){
  const pick = document.getElementById("themePick");
  pick.innerHTML = THEMES.map(t=>`<button class="pill ${t.id===themeActive?'active':''}" data-theme="${t.id}" role="tab" aria-selected="${t.id===themeActive}" aria-controls="themeFrame">${t.label}</button>`).join("");
  pick.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      themeActive = btn.dataset.theme;
      pick.querySelectorAll(".pill").forEach(b=>{
        b.classList.toggle("active", b.dataset.theme===themeActive);
        b.setAttribute("aria-selected", (b.dataset.theme===themeActive).toString());
      });
      const frame = document.getElementById("themeFrame");
      frame.className = "theme-frame " + THEMES.find(t=>t.id===themeActive).cls;
    });
  });
}

/* ---- Handle orientation changes on mobile ---- */
let resizeTimeout;
function handleResize() {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    if (window.innerWidth <= 768) {
      const activePanel = document.querySelector('.panel.active');
      if (activePanel) {
        const panelId = activePanel.id.replace('panel-', '');
        const mobileActiveBtn = document.getElementById(`mnav-${panelId}`);
        if (mobileActiveBtn) {
          mobileActiveBtn.scrollIntoView({behavior: 'instant', block: 'nearest', inline: 'center'});
        }
      }
    }
  }, 150);
}

window.addEventListener('orientationchange', handleResize);
window.addEventListener('resize', handleResize);

/* ---- Prevent double-tap zoom on buttons ---- */
document.addEventListener('dblclick', function(e) {
  if (e.target.closest('button')) {
    e.preventDefault();
  }
}, {passive: false});

/* ---- init ---- */
goTo("overview");
</script>
