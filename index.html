<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FBF8F2">
<title>Chuyên Hóa — Nguyễn Doãn Hoàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF8F2;
  --paper-soft:#F2ECDE;
  --card:#FFFFFF;
  --ink:#1E2622;
  --ink-soft:#5B665F;
  --ink-faint:#8B948C;
  --line:#E4DBC8;
  --line-soft:#EEE7D8;

  --hoa:#178C6B;       --hoa-soft:#DBEEE5;
  --toan:#2E50D6;      --toan-soft:#DEE5FB;
  --anh:#C98A1E;       --anh-soft:#F6E8C8;
  --de:#6F4E92;        --de-soft:#E9E1F1;
  --van:#A85D3F;       --van-soft:#EFE0D6;
  --sport:#1E8C99;     --sport-soft:#DBEFF1;
  --school:#7C6F5E;    --school-soft:#EAE4D8;
  --rest:#5B6B82;      --rest-soft:#E2E7EE;
  --sleep:#3A3F66;     --sleep-soft:#E4E3EF;
  --meal:#B8862E;      --meal-soft:#F3E8CE;
  --prep:#6B7560;      --prep-soft:#E5E8DD;

  --strip: linear-gradient(90deg,#D9533C,#E8B23D,#178C6B,#2E50D6,#6F4E92);
  --radius:14px;
  --radius-sm:10px;
  --shadow: 0 1px 2px rgba(30,38,34,.04), 0 6px 20px -8px rgba(30,38,34,.10);
  
  /* iPhone 14 Pro Max specific */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --dynamic-island-height: 59px;
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body{
  margin:0;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
}
.app{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  min-height: -webkit-fill-available;
  display:flex;
  line-height:1.5;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.display{font-family:'Fraunces',serif;}

/* ===== top signature strip ===== */
.signature-strip{
  position:fixed; top:0; left:0; right:0; height:4px;
  background:var(--strip); z-index:100;
}

/* ===== sidebar ===== */
.sidebar{
  width:240px; min-width:240px;
  padding:28px 18px 18px;
  border-right:1px solid var(--line);
  background:var(--paper-soft);
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.brand{padding:0 6px 22px;}
.brand .eyebrow{
  font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em;
  color:var(--hoa); text-transform:uppercase; font-weight:600;
}
.brand h1{
  font-family:'Fraunces',serif; font-size:22px; font-weight:600; margin:6px 0 4px;
  line-height:1.15; color:var(--ink);
}
.brand p{margin:0; font-size:12.5px; color:var(--ink-soft);}

.navgroup{margin-top:10px;}
.navbtn{
  display:flex; align-items:center; gap:10px;
  width:100%; text-align:left; padding:11px 12px; margin-bottom:4px;
  border:none; background:transparent; border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:600;
  color:var(--ink-soft); cursor:pointer; transition:.15s ease;
  position:relative;
  -webkit-user-select: none;
  user-select: none;
}
.navbtn .ic{font-size:16px;}
.navbtn:hover{background:var(--line-soft); color:var(--ink);}
.navbtn:active{transform: scale(0.97);}
.navbtn.active{background:var(--card); color:var(--ink); box-shadow:var(--shadow);}
.navbtn.active::before{
  content:""; position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:3px;
  background:var(--strip);
}
.sidebar-foot{
  margin-top:22px; padding:14px; border-radius:12px; background:var(--card);
  border:1px solid var(--line); font-size:12px; color:var(--ink-soft);
}
.sidebar-foot b{color:var(--ink);}

/* ===== mobile tabs ===== */
.mobiletabs{
  display:flex;
  gap:6px;
  overflow-x:auto;
  scrollbar-width:none;
  -ms-overflow-style: none;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.mobiletabs::-webkit-scrollbar{
  display:none;
}

.mobiletabs .navbtn{
  min-width:max-content;
  font-size:13px;
  padding:10px 14px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ===== main ===== */
.main{
  flex:1; 
  min-width:0; 
  padding:32px 40px 80px; 
  max-width:980px;
  -webkit-overflow-scrolling: touch;
}
.panel{display:none;}
.panel.active{display:block; animation:fade .35s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

/* hero */
.hero{
  background:linear-gradient(135deg, var(--card), var(--paper-soft));
  border:1px solid var(--line); border-radius:20px; padding:32px 34px; box-shadow:var(--shadow);
  position:relative; overflow:hidden; margin-bottom:26px;
}
.hero::after{
  content:""; position:absolute; left:0; right:0; bottom:0; height:5px; background:var(--strip);
}
.hero .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.12em; color:var(--hoa); font-weight:600; text-transform:uppercase;}
.hero h2{font-family:'Fraunces',serif; font-size:20px; font-weight:600; margin:8px 0 10px; max-width:620px;}
.hero p.lede{color:var(--ink-soft); font-size:13px; max-width:600px; margin:0 0 18px;}
.statrow{display:flex; gap:14px; flex-wrap:wrap;}
.stat{
  background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 16px; min-width:128px;
}
.stat .num{font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--ink);}
.stat .lab{font-size:11.5px; color:var(--ink-soft); margin-top:2px;}

h3.sectiontitle{
  font-family:'Fraunces',serif; font-size:19px; font-weight:600; margin:34px 0 12px; display:flex; align-items:center; gap:10px;
}
h3.sectiontitle .dot{width:8px; height:8px; border-radius:50%; background:var(--hoa); display:inline-block;}
p.lead{color:var(--ink-soft); font-size:14.5px; max-width:680px;}

.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px 22px; margin-bottom:16px;}

/* pill subnav */
.pillrow{display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 18px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;}
.pillrow::-webkit-scrollbar{display: none;}
.pill{
  font-family:'Plus Jakarta Sans',sans-serif; font-size:13px; font-weight:600; padding:8px 14px;
  border-radius:999px; border:1px solid var(--line); background:var(--paper-soft); color:var(--ink-soft);
  cursor:pointer; transition:.15s; white-space: nowrap; flex-shrink: 0;
  -webkit-user-select: none; user-select: none;
}
.pill:active{transform: scale(0.96);}
.pill:hover{border-color:var(--ink-faint);}
.pill.active{background:var(--ink); color:#fff; border-color:var(--ink);}

/* schedule table */
.daynote{font-size:13px; color:var(--ink-soft); background:var(--paper-soft); border:1px dashed var(--line); border-radius:10px; padding:10px 14px; margin-bottom:16px;}
.period-block{margin-bottom:6px;}
.period-head{
  display:flex; align-items:center; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:11.5px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin:22px 0 10px; font-weight:600;
}
.period-head .bar{flex:1; height:1px; background:var(--line);}
table.sched{width:100%; border-collapse:collapse; font-size:13.5px;}
table.sched tr{border-bottom:1px solid var(--line-soft);}
table.sched tr:last-child{border-bottom:none;}
table.sched td{padding:10px 8px; vertical-align:middle;}
table.sched td.time{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); white-space:nowrap; width:78px;}
table.sched td.tag{white-space:nowrap; width:150px;}
table.sched td.note{color:var(--ink);}
.tagpill{
  display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:8px; font-size:12.5px; font-weight:700;
}

/* legend */
.legend{display:flex; flex-wrap:wrap; gap:10px; margin:14px 0 6px;}
.legend .item{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);}
.legend .sw{width:10px; height:10px; border-radius:3px;}

/* analysis */
.analysis-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.analysis-grid .card h4{margin:0 0 8px; font-family:'Fraunces',serif; font-size:16px; display:flex; gap:8px; align-items:center;}
.analysis-grid .card p, .analysis-grid .card li{font-size:13.5px; color:var(--ink-soft); line-height:1.65;}
.analysis-grid .card ul{margin:0; padding-left:18px;}

.timeline-map{display:flex; flex-direction:column; gap:0; margin-top:10px;}
.tm-row{display:grid; grid-template-columns:90px 1fr; gap:14px; padding:10px 0; border-bottom:1px solid var(--line-soft); align-items:start;}
.tm-row .tlab{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-faint); padding-top:3px;}
.tm-row .tbody b{display:block; font-size:13.5px; margin-bottom:2px;}
.tm-row .tbody span{font-size:12.5px; color:var(--ink-soft);}

.callout{border-left:3px solid var(--hoa); background:var(--hoa-soft); border-radius:0 10px 10px 0; padding:12px 16px; font-size:13.5px; color:#163E32; margin:14px 0;}
.callout.warn{border-left-color:var(--anh); background:var(--anh-soft); color:#5A3F0F;}
.callout.cool{border-left-color:var(--rest); background:var(--rest-soft); color:#2C3A4D;}

/* style gallery */
.gallerywrap{border:1px solid var(--line); border-radius:18px; padding:24px; background:var(--paper-soft);}
.theme-frame{border-radius:14px; padding:24px; transition:.25s;}

/* --- theme: apple --- */
.theme-apple{
  background:#F5F5F7; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Helvetica,Arial,sans-serif;
  color:#1D1D1F;
}
.theme-apple .ag-title{font-size:22px; font-weight:700; margin-bottom:4px; letter-spacing:-.01em;}
.theme-apple .ag-sub{font-size:13px; color:#6E6E73; margin-bottom:16px;}
.theme-apple .ag-row{
  display:flex; align-items:center; gap:14px; background:#fff; border-radius:16px; padding:14px 18px; margin-bottom:10px;
  box-shadow:0 1px 1px rgba(0,0,0,.03), 0 8px 24px -16px rgba(0,0,0,.18);
}
.theme-apple .ag-time{font-size:13px; color:#86868B; width:92px; font-weight:600;}
.theme-apple .ag-icon{width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; background:#E8F3FF;}
.theme-apple .ag-text b{display:block; font-size:14.5px; font-weight:600;}
.theme-apple .ag-text span{font-size:12.5px; color:#6E6E73;}

/* --- theme: notion --- */
.theme-notion{background:#FFFFFF; font-family:Helvetica,Arial,sans-serif; color:#37352F; border:1px solid #EBEAE7;}
.theme-notion .ag-title{font-size:24px; font-weight:700; margin-bottom:2px;}
.theme-notion .ag-sub{font-size:13px; color:#9B9A97; margin-bottom:14px;}
.theme-notion .ag-row{display:flex; align-items:center; gap:10px; padding:7px 6px; border-radius:4px;}
.theme-notion .ag-row:hover{background:#F7F6F3;}
.theme-notion .ag-icon{width:22px; text-align:center; font-size:15px;}
.theme-notion .ag-time{font-family:'IBM Plex Mono',monospace; font-size:12px; color:#9B9A97; width:96px;}
.theme-notion .ag-text b{font-size:14px; font-weight:500; border-bottom:1px solid #EBEAE7; padding-bottom:1px;}
.theme-notion .ag-text span{display:block; font-size:12.5px; color:#9B9A97;}
.theme-notion .ag-row + .ag-row{border-top:1px solid #F1F0EC;}

/* --- theme: cyberpunk --- */
.theme-cyberpunk{
  background:#0B0B14; font-family:'IBM Plex Mono',monospace; color:#E7FBFF;
  border:1px solid #232140; box-shadow:0 0 40px -10px rgba(255,0,200,.15) inset;
}
.theme-cyberpunk .ag-title{font-size:20px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:#FF2E9A; text-shadow:0 0 12px rgba(255,46,154,.6); margin-bottom:4px;}
.theme-cyberpunk .ag-sub{font-size:11.5px; color:#5BE6FF; letter-spacing:.08em; margin-bottom:16px; text-transform:uppercase;}
.theme-cyberpunk .ag-row{display:flex; align-items:center; gap:12px; padding:10px 12px; margin-bottom:8px; background:#11101F; border:1px solid #2B2A4A; border-left:3px solid #5BE6FF; clip-path:polygon(0 0,100% 0,100% 100%,6px 100%,0 calc(100% - 6px));}
.theme-cyberpunk .ag-time{font-size:11.5px; color:#FF2E9A; width:90px; font-weight:600;}
.theme-cyberpunk .ag-icon{font-size:15px;}
.theme-cyberpunk .ag-text b{display:block; font-size:13px; color:#E7FBFF; letter-spacing:.03em;}
.theme-cyberpunk .ag-text span{font-size:11px; color:#7E8AB8;}

/* --- theme: minimalist --- */
.theme-minimal{background:#FFFFFF; font-family:'Plus Jakarta Sans',sans-serif; color:#111; border:1px solid #000;}
.theme-minimal .ag-title{font-size:18px; font-weight:400; letter-spacing:.02em; margin-bottom:2px; text-transform:uppercase;}
.theme-minimal .ag-sub{font-size:11px; color:#999; margin-bottom:18px; letter-spacing:.05em;}
.theme-minimal .ag-row{display:grid; grid-template-columns:80px 1fr; gap:16px; padding:11px 0; border-bottom:1px solid #000;}
.theme-minimal .ag-row:first-of-type{border-top:1px solid #000;}
.theme-minimal .ag-icon{display:none;}
.theme-minimal .ag-time{font-family:'IBM Plex Mono',monospace; font-size:11px; color:#111;}
.theme-minimal .ag-text b{font-size:13px; font-weight:500;}
.theme-minimal .ag-text span{font-size:11.5px; color:#888;}

.theme-pick{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}

footer.note{margin-top:50px; padding-top:18px; border-top:1px solid var(--line); font-size:12px; color:var(--ink-faint); text-align:center;}

/* ============================================
   IPHONE 14 PRO MAX OPTIMIZATIONS
   ============================================ */
@media screen and (max-width: 430px) {
  /* Safe area handling */
  .signature-strip{
    top: var(--safe-top);
  }
  
  /* Hide desktop sidebar */
  .sidebar{
    display:none;
  }
  
  /* Mobile tabs container */
  .mobiletabs{
    display:flex; 
    gap:6px; 
    overflow-x:auto; 
    position:sticky; 
    top: calc(4px + var(--safe-top));
    z-index:40; 
    background:var(--paper);
    padding: 14px 14px 10px;
    padding-top: calc(14px + var(--safe-top));
    border-bottom:1px solid var(--line);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    background: rgba(251, 248, 242, 0.85);
    scroll-snap-type: x mandatory;
  }
  
  .mobiletabs .navbtn{
    scroll-snap-align: start;
    font-size: 12px;
    padding: 9px 12px;
    border-radius: 8px;
    gap: 6px;
  }
  
  .mobiletabs .navbtn .ic{
    font-size: 14px;
  }
  
  /* Main content area */
  .main{
    padding: 12px;
    padding-bottom: calc(80px + var(--safe-bottom));
    max-width: 100%;
  }
  
  /* Hero section */
  .hero{
    padding: 20px 16px;
    border-radius: 16px;
    margin-bottom: 20px;
  }
  
  .hero .eyebrow{
    font-size: 10px;
  }
  
  .hero h2{
    font-size: 19px;
    margin: 6px 0 8px;
    line-height: 1.25;
  }
  
  .hero p.lede{
    font-size: 12px;
    line-height: 1.6;
  }
  
  /* Stats grid */
  .statrow{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  
  .stat{
    min-width: 0;
    padding: 12px 14px;
    border-radius: 12px;
  }
  
  .stat .num{
    font-size: 20px;
  }
  
  .stat .lab{
    font-size: 10px;
  }
  
  /* Section titles */
  h3.sectiontitle{
    font-size: 17px;
    margin: 28px 0 10px;
    gap: 8px;
  }
  
  p.lead{
    font-size: 13px;
  }
  
  /* Cards */
  .card{
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 12px;
  }
  
  /* Schedule table optimizations */
  table.sched{
    font-size: 12px;
  }
  
  table.sched td{
    padding: 8px 6px;
  }
  
  table.sched td.time{
    font-size: 10px;
    width: 68px;
  }
  
  table.sched td.tag{
    width: 100px;
  }
  
  table.sched td.note{
    font-size: 11px;
  }
  
  .tagpill{
    font-size: 10px;
    padding: 3px 8px;
    gap: 4px;
  }
  
  /* Period headers */
  .period-head{
    font-size: 10px;
    margin: 18px 0 8px;
  }
  
  /* Day note */
  .daynote{
    font-size: 11px;
    padding: 8px 12px;
  }
  
  /* Legend */
  .legend{
    gap: 8px;
    margin: 10px 0 4px;
  }
  
  .legend .item{
    font-size: 10px;
    gap: 4px;
  }
  
  .legend .sw{
    width: 8px;
    height: 8px;
  }
  
  /* Analysis grid */
  .analysis-grid{
    grid-template-columns: 1fr;
    gap: 12px;
  }
  
  .analysis-grid .card h4{
    font-size: 14px;
  }
  
  .analysis-grid .card p, 
  .analysis-grid .card li{
    font-size: 12px;
  }
  
  /* Timeline map */
  .tm-row{
    grid-template-columns: 70px 1fr;
    gap: 10px;
    padding: 8px 0;
  }
  
  .tm-row .tlab{
    font-size: 10px;
  }
  
  .tm-row .tbody b{
    font-size: 12px;
  }
  
  .tm-row .tbody span{
    font-size: 11px;
  }
  
  /* Callout */
  .callout{
    padding: 10px 14px;
    font-size: 12px;
    margin: 12px 0;
    border-left-width: 2px;
  }
  
  /* Theme frame */
  .theme-frame{
    padding: 16px;
  }
  
  .gallerywrap{
    padding: 16px;
    border-radius: 14px;
  }
  
  .theme-pick{
    gap: 6px;
    margin-bottom: 14px;
  }
  
  /* Footer */
  footer.note{
    margin-top: 40px;
    padding-top: 14px;
    font-size: 10px;
  }
  
  /* Smooth scroll behavior */
  .panel.active{
    animation: fadeMobile .3s ease;
  }
  
  @keyframes fadeMobile{
    from{
      opacity: 0;
      transform: translateY(2px);
    }
    to{
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  /* Active states for touch */
  .navbtn:active,
  .pill:active{
    opacity: 0.8;
  }
  
  /* Fix for iOS input zoom */
  input, textarea, select, button{
    font-size: 16px;
  }
}

/* iPhone 14 Pro Max specific - 430x932 */
@media screen and (width: 430px) and (height: 932px) {
  .main{
    padding-bottom: calc(100px + var(--safe-bottom));
  }
  
  .hero h2{
    font-size: 18px;
  }
  
  table.sched td.time{
    width: 72px;
  }
  
  table.sched td.tag{
    width: 105px;
  }
}

/* Landscape mode for iPhone 14 Pro Max */
@media screen and (max-width: 932px) and (orientation: landscape) {
  .main{
    padding: 16px;
  }
  
  .hero{
    padding: 24px 20px;
  }
  
  .statrow{
    grid-template-columns: repeat(4, 1fr);
  }
  
  .analysis-grid{
    grid-template-columns: 1fr 1fr;
  }
  
  table.sched td.tag{
    width: 120px;
  }
}

/* Dynamic Island safe area */
@supports (padding-top: env(safe-area-inset-top)) {
  .signature-strip{
    padding-top: env(safe-area-inset-top);
  }
  
  .main{
    padding-top: calc(12px + env(safe-area-inset-top));
  }
}

/* Haptic feedback simulation */
@media (hover: none) and (pointer: coarse) {
  .navbtn:active,
  .pill:active{
    transition: transform 0.1s ease;
  }
}

/* Prevent pull-to-refresh */
body{
  overscroll-behavior-y: contain;
}
</style>
</head>
<body>
<div class="signature-strip"></div>
<div class="app">

  <!-- ============ SIDEBAR (desktop) ============ -->
  <nav class="sidebar" id="sidebarNav">
    <div class="brand">

function rowsToHTML(rows){
  const groups = {sang:[], chieu:[], toi:[]};
  rows.forEach(r=>groups[r.p].push(r));
  let html = "";
  ["sang","chieu","toi"].forEach(p=>{
    if(groups[p].length===0) return;
    html += `<div class="period-block"><div class="period-head">${PERIOD_LABEL[p]}<span class="bar"></span></div>`;
    html += `<table class="sched"><tbody>`;
    groups[p].forEach(r=>{
      const tg = TAGS[r.tag];
      html += `<tr>
        <td class="time mono">${r.t}</td>
        <td class="tag"><span class="tagpill" style="background:var(${tg.cs});color:var(${tg.c});">${tg.emoji} ${tg.name}</span></td>
        <td class="note">${r.n}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  return html;
}
function legendHTML(keys){
  return `<div class="legend">${keys.map(k=>{
    const tg=TAGS[k];
    return `<div class="item"><span class="sw" style="background:var(${tg.c});"></span>${tg.emoji} ${tg.name}</div>`;
  }).join("")}</div>`;
}

  <h2 class="display" style="font-size:24px;margin:0 0 6px;">🎨 Phong Cách Thiết Kế</h2>
  <p class="lead">Cùng một lịch học — bốn ngôn ngữ thiết kế khác nhau. Bấm để xem cùng nội dung được "mặc áo" theo từng phong cách.</p>
  <div class="gallerywrap">
    <div class="theme-pick" id="themePick"></div>
    <div class="theme-frame theme-apple" id="themeFrame">
      <div class="ag-title">Hôm nay</div>
      <div class="ag-sub">Thứ Hai · Lịch hè</div>
      ${galleryHTML()}
    </div>
  </div>
  `;
}
const THEMES = [
  {id:"apple", label:"🍎 Apple", cls:"theme-apple"},
  {id:"notion", label:"◻️ Notion", cls:"theme-notion"},
  {id:"cyberpunk", label:"⚡ Cyberpunk", cls:"theme-cyberpunk"},
  {id:"minimal", label:"⬜ Minimalist", cls:"theme-minimal"},
];

/* ============================================================
   APP WIRING
   ============================================================ */
const main = document.getElementById("main");
const navgroup = document.getElementById("navgroup");
const mobileNav = document.getElementById("mobileNav");

function navButtonHTML(item, idPrefix){
  return `<button class="navbtn" data-target="${item.id}" id="${idPrefix}-${item.id}"><span class="ic">${item.icon}</span>${item.label}</button>`;
}
NAV.forEach(item=>{
  navgroup.insertAdjacentHTML("beforeend", navButtonHTML(item,"nav"));
  mobileNav.insertAdjacentHTML("beforeend", navButtonHTML(item,"mnav"));
});

function renderPanel(id){
  main.innerHTML = `<div class="panel active" id="panel-${id}"></div>`;
  const p = document.getElementById(`panel-${id}`);
  if(id==="overview") p.innerHTML = buildOverview();
  if(id==="summer"){ p.innerHTML = buildSummer(); wireSummer(); }
  if(id==="school"){ p.innerHTML = buildSchool(); wireSchool(); }
  if(id==="special"){ p.innerHTML = buildSpecial(); wireSpecial(); }
  if(id==="gallery"){ p.innerHTML = buildGallery(); wireGallery(); }
  
  // Scroll to top on mobile after navigation
  if (window.innerWidth <= 860) {
    window.scrollTo({top: 0, behavior: 'smooth'});
    // Also scroll the main container
    main.scrollTop = 0;
  }
}

function setActiveNav(id){
  document.querySelectorAll(".navbtn").forEach(b=>{
    b.classList.toggle("active", b.dataset.target===id);
  });
  
  // On mobile, scroll the active tab into view
  if (window.innerWidth <= 860) {
    const mobileActiveBtn = document.getElementById(`mnav-${id}`);
    if (mobileActiveBtn) {
      mobileActiveBtn.scrollIntoView({behavior: 'smooth', block: 'nearest', inline: 'center'});
    }
  }
}

function goTo(id){
  setActiveNav(id);
  renderPanel(id);
}

document.querySelectorAll(".navbtn").forEach(b=>{
  b.addEventListener("click", ()=>goTo(b.dataset.target));
});

/* ---- Summer sub-tabs ---- */
const SUMMER_DAYS = [
  {id:"A", label:"T2·4·6·7", data:sumA, note:"Ngày tự học toàn phần — không có buổi học thêm. Đây là ngày có khối thời gian dài nhất để học sâu Hóa & Toán."},
  {id:"B", label:"Thứ 3", data:sumB, note:"Học thêm TOÁN buổi tối (19h30–21h00). Ban ngày tập trung Hóa + làm đề + Tiếng Anh, để buổi tối chỉ cần đi học mà không phải nhồi thêm gì."},
  {id:"C", label:"Thứ 5", data:sumC, note:"Học thêm HÓA + TOÁN buổi tối (17h00–21h00) — buổi dài nhất trong tuần. Ban ngày nhẹ hơn, chỉ ôn & xem trước, để dồn năng lượng cho 4 giờ học liên tục."},
  {id:"D", label:"CN", data:sumD, note:"Học thêm HÓA buổi chiều (17h00–19h00, ngắn nhất). Đây là ngày phục hồi + tổng ôn cả tuần, cường độ thấp hơn các ngày khác."},
];
let summerActive = "A";
function wireSummer(){
  const pillrow = document.getElementById("summerPills");
  pillrow.innerHTML = SUMMER_DAYS.map(d=>`<button class="pill ${d.id===summerActive?'active':''}" data-day="${d.id}">${d.label}</button>`).join("");
  pillrow.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      summerActive = btn.dataset.day;
      pillrow.querySelectorAll(".pill").forEach(b=>b.classList.toggle("active", b.dataset.day===summerActive));
      renderSummerTable();
    });
  });
  renderSummerTable();
}
function renderSummerTable(){
  const d = SUMMER_DAYS.find(x=>x.id===summerActive);
  document.getElementById("summerTable").innerHTML = `<div class="daynote">📌 ${d.note}</div>` + rowsToHTML(d.data);
}

/* ---- Special sub-tabs ---- */
const SPECIAL_MODES = [
  {id:"cram", label:"🚀 Nước rút", fn:specialCram},
  {id:"low", label:"🔋 Mất động lực", fn:specialLow},
  {id:"multi", label:"⚠️ Nhiều bài KT", fn:specialMulti},
];
let specialActive = "cram";
function wireSpecial(){
  const pillrow = document.getElementById("specialPills");
  pillrow.innerHTML = SPECIAL_MODES.map(m=>`<button class="pill ${m.id===specialActive?'active':''}" data-m="${m.id}">${m.label}</button>`).join("");
  pillrow.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      specialActive = btn.dataset.m;
      pillrow.querySelectorAll(".pill").forEach(b=>b.classList.toggle("active", b.dataset.m===specialActive));
      renderSpecialBody();
    });
  });
  renderSpecialBody();
}
function renderSpecialBody(){
  const m = SPECIAL_MODES.find(x=>x.id===specialActive);
  document.getElementById("specialBody").innerHTML = m.fn();
}

/* ---- Gallery theme switch ---- */
let themeActive = "apple";
function wireGallery(){
  const pick = document.getElementById("themePick");
  pick.innerHTML = THEMES.map(t=>`<button class="pill ${t.id===themeActive?'active':''}" data-theme="${t.id}">${t.label}</button>`).join("");
  pick.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      themeActive = btn.dataset.theme;
      pick.querySelectorAll(".pill").forEach(b=>b.classList.toggle("active", b.dataset.theme===themeActive));
      const frame = document.getElementById("themeFrame");
      frame.className = "theme-frame " + THEMES.find(t=>t.id===themeActive).cls;
    });
  });
}

/* ---- Handle orientation changes on mobile ---- */
function handleOrientationChange() {
  if (window.innerWidth <= 860) {
    // Re-scroll active tab into view
    const activePanel = document.querySelector('.panel.active');
    if (activePanel) {
      const panelId = activePanel.id.replace('panel-', '');
      const mobileActiveBtn = document.getElementById(`mnav-${panelId}`);
      if (mobileActiveBtn) {
        setTimeout(() => {
          mobileActiveBtn.scrollIntoView({behavior: 'smooth', block: 'nearest', inline: 'center'});
        }, 100);
      }
    }
  }
}

window.addEventListener('orientationchange', handleOrientationChange);
window.addEventListener('resize', () => {
  // Small delay to get correct dimensions after resize
  setTimeout(handleOrientationChange, 200);
});

/* ---- init ---- */
goTo("overview");

// Prevent double-tap zoom on buttons
document.addEventListener('dblclick', function(e) {
  if (e.target.tagName === 'BUTTON') {
    e.preventDefault();
  }
}, {passive: false});
</script>
